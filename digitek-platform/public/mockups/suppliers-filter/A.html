<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>סינון התמחויות — וריאציה A: Sidebar</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Heebo',sans-serif;background:#f8fafc;color:#0f172a;font-size:14px;line-height:1.5}
  .page{display:flex;gap:16px;max-width:1400px;margin:0 auto;padding:20px}
  .sidebar{width:300px;flex-shrink:0;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px;position:sticky;top:20px;align-self:flex-start;max-height:calc(100vh - 40px);overflow:hidden;display:flex;flex-direction:column}
  .sb-title{font-weight:800;font-size:15px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
  .sb-title button{background:none;border:none;color:#1e40af;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600}
  .sb-search{position:relative;margin-bottom:10px}
  .sb-search input{width:100%;padding:8px 32px 8px 10px;border:1px solid #cbd5e1;border-radius:8px;font-family:inherit;font-size:13px;outline:none}
  .sb-search input:focus{border-color:#1e40af;box-shadow:0 0 0 3px rgba(30,64,175,.1)}
  .sb-search::after{content:'🔍';position:absolute;right:10px;top:50%;transform:translateY(-50%);opacity:.5;font-size:13px}
  .sb-selected{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:8px;margin-bottom:10px}
  .sb-selected-label{font-size:11px;color:#1e40af;font-weight:600;margin-bottom:5px}
  .sb-tags{display:flex;flex-wrap:wrap;gap:4px}
  .sb-tag{background:#1e40af;color:#fff;padding:3px 7px;border-radius:999px;font-size:11px;font-weight:500;display:inline-flex;gap:4px;align-items:center}
  .sb-tag .x{cursor:pointer;font-weight:700;opacity:.8}
  .sb-tag .x:hover{opacity:1}
  .sb-list{flex:1;overflow-y:auto;margin:0 -4px;padding:0 4px}
  .sb-list::-webkit-scrollbar{width:6px}
  .sb-list::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
  .sb-group{margin-bottom:4px}
  .sb-group-h{display:flex;align-items:center;gap:6px;padding:7px 6px;cursor:pointer;border-radius:6px;font-size:13px;font-weight:700;color:#0f172a;user-select:none}
  .sb-group-h:hover{background:#f1f5f9}
  .sb-chev{display:inline-block;width:12px;color:#64748b;font-size:10px;transition:transform .15s}
  .sb-group.open .sb-chev{transform:rotate(90deg)}
  .sb-group-count{margin-right:auto;color:#94a3b8;font-size:11px;font-weight:500}
  .sb-items{padding:2px 18px 4px;display:none}
  .sb-group.open .sb-items{display:block}
  .sb-item{display:flex;align-items:center;gap:8px;padding:6px 6px;cursor:pointer;border-radius:5px;font-size:12.5px;color:#334155}
  .sb-item:hover{background:#f8fafc}
  .sb-item input{margin:0;cursor:pointer;accent-color:#1e40af}
  .sb-item-name{flex:1}
  .sb-item-count{color:#94a3b8;font-size:11px;font-weight:500}
  .sb-item.selected{color:#1e40af;font-weight:600}

  .main{flex:1;min-width:0}
  .top-search{background:#fff;border:1px solid #e2e8f0;border-radius:999px;padding:10px 18px;display:flex;align-items:center;gap:10px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .top-search input{flex:1;border:none;outline:none;font-family:inherit;font-size:14px;background:transparent}
  .cluster-chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:14px}
  .chip{background:#fff;border:1px solid #e2e8f0;border-radius:999px;padding:7px 14px;font-size:13px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
  .chip.active{background:#0f172a;color:#fff;border-color:#0f172a}
  .chip-num{background:#f1f5f9;color:#64748b;padding:1px 7px;border-radius:999px;font-size:11px;font-weight:600}
  .chip.active .chip-num{background:rgba(255,255,255,.2);color:#fff}
  .results-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:0 4px}
  .results-count strong{font-size:24px;color:#0f172a;font-weight:800}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
  .card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;display:flex;cursor:pointer;transition:all .15s}
  .card:hover{box-shadow:0 4px 12px rgba(0,0,0,.06);transform:translateY(-1px)}
  .card-stripe{width:5px;flex-shrink:0}
  .card-body{padding:12px 14px;flex:1;min-width:0}
  .card-name{font-weight:700;font-size:14px;color:#0f172a;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card-meta{font-size:11px;color:#64748b;margin-bottom:8px}
  .card-clusters{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
  .ctag{background:#f1f5f9;color:#475569;padding:2px 7px;border-radius:6px;font-size:10.5px;font-weight:500}
  .card-num{display:flex;gap:14px;font-size:11px;color:#475569}
  .card-num strong{color:#1e40af;font-size:14px;font-weight:800;display:block}

  .nudge{margin:0 auto 20px;max-width:600px;background:#fef3c7;border:1px solid #fcd34d;border-radius:10px;padding:10px 14px;font-size:13px;text-align:center;color:#92400e}
  .badge-title{display:inline-block;background:#1e40af;color:#fff;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;margin-bottom:8px}
</style>
</head>
<body>

<div class="page">
  <aside class="sidebar">
    <div class="sb-title">
      סינון התמחויות
      <button id="clearAll">נקה הכל</button>
    </div>
    <div class="sb-search">
      <input id="specSearch" placeholder="חפש התמחות...">
    </div>
    <div class="sb-selected" id="selectedBox" style="display:none">
      <div class="sb-selected-label">נבחרו <span id="selCount">0</span></div>
      <div class="sb-tags" id="selTags"></div>
    </div>
    <div class="sb-list" id="specList"></div>
  </aside>

  <main class="main">
    <div class="nudge"><span class="badge-title">וריאציה A</span> Sidebar קבוע · חיפוש + checkboxes לפי אשכול · קלאסי ועובד היטב לרשימות ארוכות</div>

    <div class="top-search">
      <span>🔍</span>
      <input placeholder='חיפוש לפי שם ספק, מק"ט, מנו"ף...'>
    </div>
    <div class="cluster-chips" id="clusterChips"></div>

    <div class="results-bar">
      <div class="results-count"><strong id="resCount">148</strong> ספקים זוכים</div>
      <div style="font-size:12px;color:#64748b" id="resDetail">42 התמחויות · 694 הרשאות</div>
    </div>
    <div class="cards" id="cards"></div>
  </main>
</div>

<script>
const CLUSTER_COLOR={ 'תיכנון ניתוח ופיתוח':'#1e40af','תשתיות והגירה לענן':'#7c3aed','חדשנות טכנולוגית':'#ec4899','אינטגרציה של פתרונות צד ג לענן':'#f97316','הדרכה':'#059669','אבטחת מידע':'#dc2626','בסיסי נתונים':'#0d9488' };
let DATA=null, selectedSpecs=new Set(), activeCluster=null, specSearchQ='';

fetch('../suppliers/data.json').then(r=>r.json()).then(d=>{ DATA=d; render(); });

function render(){
  renderClusterChips();
  renderSpecList();
  renderCards();
}

function renderClusterChips(){
  const total=DATA.totals.suppliers;
  const html=['<button class="chip '+(activeCluster===null?'active':'')+'" onclick="setCluster(null)"><span>כל האשכולות</span><span class="chip-num">'+total+'</span></button>'];
  DATA.clusters.forEach(c=>{
    html.push('<button class="chip '+(activeCluster===c.name?'active':'')+'" onclick="setCluster(\''+c.name.replace(/'/g,"\\'")+'\')"><span>'+c.name+'</span><span class="chip-num">'+c.suppliers+'</span></button>');
  });
  document.getElementById('clusterChips').innerHTML=html.join('');
}

function renderSpecList(){
  // Group specs by cluster
  const byCluster={};
  DATA.rows.forEach(r=>{
    if(!byCluster[r.c]) byCluster[r.c]={};
    if(!byCluster[r.c][r.sp]) byCluster[r.c][r.sp]=new Set();
    byCluster[r.c][r.sp].add(r.s);
  });
  const q=specSearchQ.toLowerCase().trim();
  const html=[];
  DATA.clusters.forEach(c=>{
    if(activeCluster && activeCluster!==c.name) return;
    const specs=byCluster[c.name]||{};
    const filtered=Object.entries(specs).filter(([n])=>!q || n.toLowerCase().includes(q));
    if(filtered.length===0) return;
    const groupOpen = activeCluster===c.name || q || selectedSpecs.size>0 || DATA.clusters.length<=3;
    html.push('<div class="sb-group '+(groupOpen?'open':'')+'">');
    html.push('<div class="sb-group-h" onclick="this.parentElement.classList.toggle(\'open\')"><span class="sb-chev">▶</span><span>'+c.name+'</span><span class="sb-group-count">'+filtered.length+'</span></div>');
    html.push('<div class="sb-items">');
    filtered.forEach(([name, supSet])=>{
      const sel = selectedSpecs.has(name);
      html.push('<label class="sb-item '+(sel?'selected':'')+'"><input type="checkbox" '+(sel?'checked':'')+' onchange="toggleSpec(\''+name.replace(/'/g,"\\'")+'\')"><span class="sb-item-name">'+name+'</span><span class="sb-item-count">'+supSet.size+'</span></label>');
    });
    html.push('</div></div>');
  });
  if(html.length===0) html.push('<div style="color:#94a3b8;padding:20px;text-align:center;font-size:12px">לא נמצאו התמחויות</div>');
  document.getElementById('specList').innerHTML=html.join('');

  // selected box
  const sb=document.getElementById('selectedBox');
  if(selectedSpecs.size===0){ sb.style.display='none'; return; }
  sb.style.display='block';
  document.getElementById('selCount').textContent=selectedSpecs.size;
  document.getElementById('selTags').innerHTML=Array.from(selectedSpecs).map(s=>'<span class="sb-tag">'+s+'<span class="x" onclick="toggleSpec(\''+s.replace(/'/g,"\\'")+'\')">×</span></span>').join('');
}

function renderCards(){
  // Aggregate suppliers
  const supMap={};
  DATA.rows.forEach(r=>{
    if(activeCluster && r.c!==activeCluster) return;
    if(selectedSpecs.size && !selectedSpecs.has(r.sp)) return;
    if(!supMap[r.s]){ supMap[r.s]={name:r.s,m:r.m,ag:r.ag,specs:new Set(),clusters:new Set(),large:0,small:0}; }
    supMap[r.s].specs.add(r.sp);
    supMap[r.s].clusters.add(r.c);
    if(r.sz==='גדול') supMap[r.s].large++;
    else if(r.sz==='קטן') supMap[r.s].small++;
  });
  const sups=Object.values(supMap).sort((a,b)=>b.specs.size-a.specs.size);
  document.getElementById('resCount').textContent=sups.length;
  const totalSpecs = new Set();
  let totalQuals=0;
  DATA.rows.forEach(r=>{
    if(activeCluster && r.c!==activeCluster) return;
    if(selectedSpecs.size && !selectedSpecs.has(r.sp)) return;
    totalSpecs.add(r.sp); totalQuals++;
  });
  document.getElementById('resDetail').textContent=totalSpecs.size+' התמחויות · '+totalQuals+' הרשאות';

  const html=sups.slice(0,30).map(s=>{
    const clusters=Array.from(s.clusters);
    const color=CLUSTER_COLOR[clusters[0]]||'#94a3b8';
    return '<div class="card"><div class="card-stripe" style="background:'+color+'"></div><div class="card-body"><div class="card-name">'+s.name+'</div><div class="card-meta">מנו"ף '+s.m+' · הסכם '+s.ag+'</div><div class="card-clusters">'+clusters.slice(0,2).map(c=>'<span class="ctag">'+c+'</span>').join('')+(clusters.length>2?'<span class="ctag">+'+(clusters.length-2)+'</span>':'')+'</div><div class="card-num"><div><strong>'+s.specs.size+'</strong>התמחויות</div><div><strong style="color:#1e40af">'+s.large+'</strong>גדול</div><div><strong style="color:#f59e0b">'+s.small+'</strong>קטן</div></div></div></div>';
  }).join('');
  document.getElementById('cards').innerHTML=html || '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#94a3b8">לא נמצאו תוצאות</div>';
}

function setCluster(c){ activeCluster=c; selectedSpecs=new Set(); render(); }
function toggleSpec(name){ if(selectedSpecs.has(name)) selectedSpecs.delete(name); else selectedSpecs.add(name); render(); }
document.getElementById('specSearch').addEventListener('input',e=>{ specSearchQ=e.target.value; renderSpecList(); });
document.getElementById('clearAll').addEventListener('click',()=>{ selectedSpecs=new Set(); activeCluster=null; specSearchQ=''; document.getElementById('specSearch').value=''; render(); });
</script>
</body>
</html>

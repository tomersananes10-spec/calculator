name: Roved5 Weekly Sync

# מסנכרן את הקטלוג של רובד 5 פעם בשבוע מ-Google Sheet ציבורי.
# הסקריפט מוריד XLSX → מפעיל parse-roved5.cjs → אם ה-JSON השתנה,
# מבצע commit + push ל-develop. Vercel preview נפרס אוטומטית.
#
# Sheet ID: 1tVqGbXrEadyMOkvq1qL--85RiAVHF-uQ (anyone-with-link)
#
# הפעלה ידנית: GitHub → Actions → "Roved5 Weekly Sync" → Run workflow.

on:
  schedule:
    # יום ראשון 00:00 UTC = 03:00 שעון ישראל
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

env:
  SHEET_ID: 1tVqGbXrEadyMOkvq1qL--85RiAVHF-uQ
  XLSX_PATH: /tmp/roved5-source.xlsx

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download XLSX from Google Sheets
        run: |
          URL="https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=xlsx"
          echo "Downloading from: $URL"
          curl -sSL --fail \
            --retry 3 --retry-delay 10 --retry-all-errors \
            --max-time 60 \
            -o "$XLSX_PATH" \
            "$URL"
          ls -la "$XLSX_PATH"
          file "$XLSX_PATH"

      - name: Install xlsx parser
        working-directory: digitek-platform
        run: npm install xlsx --no-save

      - name: Run parser
        working-directory: digitek-platform
        run: node scripts/parse-roved5.cjs "$XLSX_PATH"

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- digitek-platform/src/data/roved5Services.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "אין שינויים ב-JSON — דילוג"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            # Summary statistics for the commit message
            added=$(git diff --numstat -- digitek-platform/src/data/roved5Services.json | awk '{print $1}')
            removed=$(git diff --numstat -- digitek-platform/src/data/roved5Services.json | awk '{print $2}')
            echo "added=$added" >> "$GITHUB_OUTPUT"
            echo "removed=$removed" >> "$GITHUB_OUTPUT"
            git diff --stat -- digitek-platform/src/data/roved5Services.json
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add digitek-platform/src/data/roved5Services.json
          git commit -m "chore(roved5): סנכרון שבועי מ-Google Sheets

+${{ steps.diff.outputs.added }} / -${{ steps.diff.outputs.removed }} שורות
מקור: https://docs.google.com/spreadsheets/d/${SHEET_ID}/

[skip ci]"
          git push origin develop

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `❌ Roved5 sync failed — ${new Date().toISOString().slice(0,10)}`
            const body = `הסנכרון השבועי של רובד 5 נכשל.\n\n` +
              `**Run**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n` +
              `סיבות אפשריות:\n` +
              `- Google Sheets לא נגיש או שונה הרשאות (חייב להיות anyone-with-link)\n` +
              `- מבנה ה-XLSX השתנה (עמודות חדשות) — לבדוק parse-roved5.cjs\n` +
              `- rate-limit (429) מ-Google — להמתין ולנסות שוב ידנית\n\n` +
              `הפעלה ידנית: Actions → Roved5 Weekly Sync → Run workflow.`
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['roved5-sync-failed']
            })
